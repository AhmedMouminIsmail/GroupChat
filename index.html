<!DOCTYPE html>
<html lang="en">

<head id="head">
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/128/2496/2496599.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="titleTab">GeneralChat</title>
    <link rel="stylesheet" href="./phone.css">
</head>

<body style="background-color: rgb(255, 255, 255);" class="body">
    <script src="./main.js"></script>
    <dialog id="deviceType" style="box-shadow: 10px 10px 1px black; border-radius: 10px;">
        <p style="text-align: center; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; font-weight: bolder;">
            What device are you using ?
        </p>
        <div class="boxOne" style="display: flex; flex-direction: column; gap: 10px;">
            <button style="cursor: pointer; padding: 15px; border-radius: 10px;" onclick="phoneStyle()">
                <img src="https://cdn-icons-png.flaticon.com/128/0/488.png" alt="phoneImage">
                <p style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; font-weight: bolder;">
                    PHONE
                </p>
            </button>
            <button style="cursor: pointer; border-radius: 10px; padding: 15px;" onclick="computerStyle()">
                <img src="https://cdn-icons-png.flaticon.com/128/3076/3076518.png" alt="computerImage">
                <p style="font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; font-weight: bolder;">
                    COMPUTER
                </p>
            </button>
        </div>
    </dialog>
    <p style="font-size: xx-large; text-align: center; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; font-weight: bolder;">
        Internet's General Chat
    </p>
    <p style="font-size: small; text-align: center; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; font-weight: normal;">
        by Ahmed Moumin
    </p>
    <br>
    <p style="text-align: center;">
        <div class="wrapperTwo" style="display: flex; justify-content: center;">
            <div class="boxFour" style="display: flex; align-items: center; flex-direction: row; border: solid black; border-radius: 10px; box-shadow: 5px 5px 1px black; position: absolute; padding-left: 10px; padding-right: 10px;">
                <div class="online" style="border-radius: 50%; padding: 5px; background-color: green; position: absolute; "></div>
                <p id="userCurrent" style="margin-left: 20px; font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; font-weight: bold;"></p>
            </div>
        </div>
    </p>
    <br>
    <br>
    <br>
    <p style="text-align: center;">
        <textarea id="Chat" class="chat" readonly></textarea>
    </p>
    <div class="wrapper" style="display: flex; justify-content: center;">
        <p style="text-align: center; display: flex; gap: 10px;  align-items:center ; ">
            <input type="text" class="typingBar" id="typingBar" placeholder="Type here...">
            <button class="sendBtn" style="cursor: pointer;" onclick="send()">
            <img src="https://cdn-icons-png.flaticon.com/128/9333/9333991.png" class="sendLogo"  alt="sendBtn">
        </button>
        </p>
    </div>
    <dialog id="use" style="display: flex; box-shadow: 10px 10px 1px black; border-radius: 10px; gap: 10px; ">

        <input type="text" class="typingBar" placeholder="Username..." id="userbar">
        <button class="sendBtn" style="cursor: pointer;" onclick="CHOOSE()">
                Done
            </button>

    </dialog>

</body>

</html>
